model = "gpt-5.5"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"

[hooks]
SessionStart = [{ hooks = [{ type = "command", command = "/home/developer/bin/codex-tmux-title idle generate", timeout = 60 }] }]
UserPromptSubmit = [{ hooks = [{ type = "command", command = "/home/developer/bin/codex-tmux-title working generate", timeout = 60 }] }]
PreToolUse = [{ hooks = [{ type = "command", command = "/home/developer/bin/codex-tmux-title working", timeout = 5 }] }]
PermissionRequest = [{ hooks = [{ type = "command", command = "/home/developer/bin/codex-tmux-title attention", timeout = 5 }] }]
Stop = [{ hooks = [{ type = "command", command = "/home/developer/bin/codex-tmux-title idle", timeout = 5 }] }]

[projects."/home/developer/projects/boardsesh"]
trust_level = "trusted"

[projects."/home/developer/projects/blackheathdc-ansible"]
trust_level = "trusted"

[projects."/home/developer"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."github@openai-curated"]
enabled = true

[mcp_servers.home-assistant]
url = "https://ha.mdj.ac/api/mcp"
bearer_token_env_var = "HOME_ASSISTANT_TOKEN"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_create_pull_request]
approval_mode = "approve"
