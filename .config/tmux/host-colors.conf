# Per-host tmux status bar colours.
# Looked up by ~/bin/tmux-host-color using `hostname -s`.
#
# Format (whitespace-separated):
#   <hostname>  <bg-colour>  <fg-colour>
#
# Use 256-colour names (colour0..colour255) or hex (#rrggbb).
# Pick subtle dark backgrounds so the rest of the status bar stays readable;
# pair with a light fg (colour250+) for contrast.
#
# Suggested subtle palette:
#   colour17  deep navy        colour22  forest green
#   colour18  dark blue        colour23  dark teal
#   colour52  dark wine        colour53  dark purple
#   colour54  dark indigo      colour58  dark olive
#   colour88  dark red         colour94  dark amber
#   colour29  dark seagreen    colour235 default charcoal

# hostname    bg         fg
MARCOSMBP     colour23   colour252
default       colour235  colour250
