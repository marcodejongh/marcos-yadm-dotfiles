# VibeTunnel tmux configuration
set -g mouse on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Easy window splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Session management
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# default statusbar colors
set-option -g status-bg colour235 #base02
set-option -g status-fg colour130 #yellow

# default window title colors
#set-window-option -g window-status-fg colour33 #base0
#set-window-option -g window-status-bg default
#set-window-option -g window-status-attr dim

# active window title colors
#set-window-option -g window-status-current-fg colour196 #orange
#set-window-option -g window-status-current-bg default
#set-window-option -g window-status-current-attr bright

# pane border - dynamic colors set by tmux-peacock-sync
# Commented out peacock sync stuff - need to check into dotfiles from work laptop
#set-option -g pane-border-style fg=colour240
#set-option -g pane-active-border-style fg=colour250

# window background styles - will be overridden by tmux-peacock-sync when in git repos
set-option -g window-style bg=default
set-option -g window-active-style bg=default

# message text
#set-option -g message-bg colour235 #base02
#set-option -g message-fg colour196 #orange

# pane number display
set-option -g display-panes-active-colour colour20 #blue
set-option -g display-panes-colour colour196 #orange

# clock
set-window-option -g clock-mode-colour colour40 #green

# Status bar - show hostname on the right
set-option -g status-right "#[fg=colour250]#H #[fg=colour130]%H:%M %d-%b-%y"

# Show pane titles in top border (populated by Claude hooks and tmux-peacock)
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Note: tmux-window-name disabled - it overwrites manual renames
# set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'marcodejongh/tmux-peacock'

# Resurrect and Continuum settings - optimized for performance
#set -g @continuum-restore 'on'  # Auto restore sessions on tmux start
set -g @continuum-save-interval '60'  # Save every 60 minutes (reduced frequency)
set -g @resurrect-capture-pane-contents 'off'  # Disable to improve performance
set -g @resurrect-strategy-vim 'session'  # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'  # Restore neovim sessions

# Enable automatic window renaming (tmux built-in)
# This respects manual renames - once you rename with Prefix+, it stays
set -g automatic-rename on

# Original tmux-fzf key (requires prefix)
TMUX_FZF_LAUNCH_KEY="C-f"

# Ctrl+P binding for full tmux-fzf menu/command palette (no prefix needed)
bind -n C-p run-shell -b "~/.tmux/plugins/tmux-fzf/main.sh"

# Ctrl+Shift+O binding disabled — most terminals can't distinguish C-S-o from C-o
# bind -n C-S-o run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/window.sh switch"

# Alt+W: fuzzy pane picker across all sessions/windows
bind -n M-w display-popup -E -w 70% -h 70% \
  "tmux list-panes -aF '#{session_name}:#{window_index}.#{pane_index}  [#{window_name}]  #{pane_title}  (#{pane_current_command})' \
  | fzf --reverse --header='Switch Pane' \
  | sed 's/  .*//' \
  | xargs tmux switch-client -t"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
