# VibeTunnel tmux configuration
set -g mouse on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Ring the bell if any background window rang a bell
set -g bell-action any

# set first window to index 1 (not 0) to map more to the keyboard layout
set -g base-index 1
setw -g pane-base-index 1

# pass through xterm keys
set -g xterm-keys on

# Use vi keybindings for tmux commandline input and copy mode
set -g status-keys vi
setw -g mode-keys vi

###########################################################################
# General keymap

bind-key C-d detach-client
bind-key C-c new-window
bind R refresh-client

# reload tmux config
unbind r
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config.'

###########################################################################
# Window management / navigation

# Easy window splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind s
unbind C-s
bind-key s split-window -c "#{pane_current_path}"
bind-key C-s split-window -c "#{pane_current_path}"
unbind v
unbind C-v
bind-key v split-window -h -c "#{pane_current_path}"
bind-key C-v split-window -h -c "#{pane_current_path}"

# move between windows
bind-key C-h previous-window
bind-key C-l next-window

# C-\ (no prefix) to skip to last window we were in before this one
bind -n "C-\\" last-window

# C-Space (no prefix) to tab to next window
bind -n C-Space next-window

# Session management
bind S command-prompt -p "New session name:" "new-session -s '%%'"

###########################################################################
# Pane management / navigation

# navigation with C-{h,j,k,l} -- NO PREFIX
bind -n C-k run-shell 'tmux-vim-select-pane -U'
bind -n C-j run-shell 'tmux-vim-select-pane -D'
bind -n C-h run-shell 'tmux-vim-select-pane -L'
bind -n C-l run-shell 'tmux-vim-select-pane -R'

# C-k passthrough (kill-to-eol)
unbind C-k
bind C-k send-key C-k

# Pane resize in all four directions using vi bindings
bind-key J resize-pane -D
bind-key K resize-pane -U
bind-key H resize-pane -L
bind-key L resize-pane -R

# Ctrl+q to display pane numbers for quick jumping (no prefix needed)
bind -n C-q display-panes

# easily toggle synchronization (mnemonic: e is for echo)
bind e setw synchronize-panes on
bind E setw synchronize-panes off

###########################################################################
# Scrollback / copy mode (vi-style)

unbind [
unbind ]
bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down
unbind-key -T copy-mode-vi Space     ;   bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind-key -T copy-mode-vi C-v       ;   bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key -T copy-mode-vi [         ;   bind-key -T copy-mode-vi [ send-keys -X begin-selection
unbind-key -T copy-mode-vi ]         ;   bind-key -T copy-mode-vi ] send-keys -X copy-selection

###########################################################################
# Mouse mode

# Toggle mouse on/off
bind m set -g mouse on  \; display 'Mouse: ON'
bind M set -g mouse off \; display 'Mouse: OFF'

###########################################################################
# Colours (Solarized dark)

# default statusbar colors - per-host mapping in ~/.config/tmux/host-colors.conf
run-shell "tmux set-option -g status-style \"$(~/bin/tmux-host-color)\""

# window background styles - will be overridden by tmux-peacock-sync when in git repos
set-option -g window-style bg=default
set-option -g window-active-style bg=default

# pane number display
set-option -g display-panes-active-colour colour20 #blue
set-option -g display-panes-colour colour196 #orange

# clock
set-window-option -g clock-mode-colour colour40 #green

# Status bar - show hostname on the right (inherits fg from status-style)
set-option -g status-right "#H  %H:%M %d-%b-%y"

# Show pane titles in top border (populated by Claude hooks and tmux-peacock)
set -g pane-border-status top
set -g pane-border-format " #{pane_title} "

bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

###########################################################################
# Plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Note: tmux-window-name disabled - it overwrites manual renames
# set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'marcodejongh/tmux-peacock'

# Resurrect and Continuum settings - optimized for performance
#set -g @continuum-restore 'on'  # Auto restore sessions on tmux start
set -g @continuum-save-interval '60'  # Save every 60 minutes (reduced frequency)
set -g @resurrect-capture-pane-contents 'off'  # Disable to improve performance
set -g @resurrect-strategy-vim 'session'  # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'  # Restore neovim sessions

# Enable automatic window renaming (tmux built-in)
# This respects manual renames - once you rename with Prefix+, it stays
set -g automatic-rename on

# Original tmux-fzf key (requires prefix)
TMUX_FZF_LAUNCH_KEY="C-f"

# Ctrl+P binding for full tmux-fzf menu/command palette (no prefix needed)
bind -n C-p run-shell -b "~/.tmux/plugins/tmux-fzf/main.sh"

# Alt+W: fuzzy pane picker across all sessions/windows
bind -n M-w display-popup -E -w 70% -h 70% \
  "tmux list-panes -aF '#{session_name}:#{window_index}.#{pane_index}  [#{window_name}]  #{pane_title}  (#{pane_current_command})' \
  | fzf --reverse --header='Switch Pane' \
  | sed 's/  .*//' \
  | xargs tmux switch-client -t"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
